<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alper'in Dino Oyunu 🦖</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: black; font-family: sans-serif; touch-action: manipulation; }
        #camera-stream { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: -1; }
        #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0, 0, 0, 0.7); z-index: 10; }
        #start-button { padding: 25px 60px; font-size: 30px; background-color: #ffcc00; color: #333; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        h1 { color: white; margin-bottom: 30px; text-align: center; }
        canvas { display: block; background-color: transparent !important; }
    </style>
</head>
<body>

    <video id="camera-stream" autoplay playsinline muted></video>
    
    <div id="start-screen">
        <h1>🦖 DİNO GÖKYÜZÜNDE!</h1>
        <button id="start-button">OYUNA BAŞLA!</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const video = document.getElementById('camera-stream');
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                .then(stream => { video.srcObject = stream; })
                .catch(err => { console.log("Kamera izni yok."); });
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let gameRunning = false;
        let score = 0;
        let dino = { x: 50, y: canvas.height - 150, w: 50, h: 50, dy: 0, jumpForce: 18, grounded: false };
        let obstacles = [];
        let gameSpeed = 10;

        // OYUNU BAŞLATMA
        document.getElementById('start-button').addEventListener('click', (e) => {
            e.stopPropagation();
            document.getElementById('start-screen').style.display = 'none';
            gameRunning = true;
            score = 0;
            obstacles = [];
            dino.y = canvas.height - 150;
            animate();
        });

        // ZIPLAMA (Dokunmatik ve Klavye)
        function jump() {
            if (gameRunning && dino.grounded) {
                dino.dy = -dino.jumpForce;
                dino.grounded = false;
            }
        }

        window.addEventListener('keydown', (e) => { if (e.code === 'Space' || e.code === 'ArrowUp') jump(); });
        window.addEventListener('touchstart', (e) => { if (e.target.id !== 'start-button') jump(); });

        function animate() {
            if (!gameRunning) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Dino Fizik
            dino.dy += 1;
            dino.y += dino.dy;

            // Yer Çekimi
            if (dino.y + dino.h > canvas.height - 50) {
                dino.y = canvas.height - 50 - dino.h;
                dino.dy = 0;
                dino.grounded = true;
            }

            // Dino Çizim (Beyaz Kare)
            ctx.fillStyle = "white";
            ctx.fillRect(dino.x, dino.y, dino.w, dino.h);
            ctx.fillStyle = "black";
            ctx.fillRect(dino.x + 35, dino.y + 10, 8, 8); // Göz

            // --- ENGEL MESAFESİ (SOSYAL MESAFELİ) ---
            let canSpawn = true;
            if (obstacles.length > 0) {
                let lastObs = obstacles[obstacles.length - 1];
                if (lastObs.x > (canvas.width - 800)) { 
                    canSpawn = false; 
                }
            }

            if (canSpawn && Math.random() < 0.02) {
                obstacles.push({ x: canvas.width, y: canvas.height - 100, w: 40, h: 50 });
            }

            // Engelleri Hareket Ettir
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.x -= gameSpeed;

                // Engel Çizim (Kırmızı Kare)
                ctx.fillStyle = "#ff4d4d";
                ctx.fillRect(obs.x, obs.y, obs.w, obs.h);

                // Çarpışma Testi
                if (dino.x < obs.x + obs.w && 
                    dino.x + dino.w > obs.x && 
                    dino.y < obs.y + obs.h && 
                    dino.y + dino.h > obs.y) {
                    gameRunning = false;
                    alert("Yandın! Skorun: " + Math.floor(score));
                    document.getElementById('start-screen').style.display = 'flex';
                }

                // Ekrandan çıkan engeli sil
                if (obs.x + obs.w < 0) {
                    obstacles.splice(i, 1);
                }
            }

            // Skor
            score += 0.2;
            ctx.fillStyle = "white";
            ctx.font = "bold 25px Arial";
            ctx.fillText("SKOR: " + Math.floor(score), 30, 50);

            requestAnimationFrame(animate);    
        }

        // Ekran boyutu değişirse ayarla
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            dino.y = canvas.height - 150;
        });
    </script>
</body>
</html>
